server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-assistant

  # 通义千问 (DashScope) 配置 - 使用 OpenAI 兼容模式
  ai:
    openai:
      # DashScope API Key (请替换为你的API Key)
      api-key: ${DASHSCOPE_API_KEY:}
      # DashScope 基础URL (注意：不要带 /v1 后缀)
      base-url: ${DASHSCOPE_BASE_URL:}
      chat:
        options:
          # 模型名称 - qwen-max 效果更好
          model: ${CHAT_MODEL:}
          temperature: 0.7
          max-tokens: 4096

  # 对话记忆配置
  conversation:
    max-history: 20
    ttl-minutes: 30

# CORS 配置
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000,http://localhost:8080
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# 日志配置
logging:
  level:
    root: INFO
    com.ai.assistant: DEBUG
    org.springframework.ai: INFO